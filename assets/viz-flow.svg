<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="flowBg" cx="70%" cy="70%" r="80%">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#0a0a18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flowStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#a5b4fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="flowGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="flowDots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#080816"/>
  <rect width="1600" height="900" fill="url(#flowDots)"/>
  <rect width="1600" height="900" fill="url(#flowBg)"/>

  <!-- Flow curves — sweeping diagonally upward -->
  <g fill="none" stroke-linecap="round">
    <path d="M -80 760 Q 400 600 880 580 T 1700 220" stroke="url(#flowStroke)" stroke-width="2"/>
    <path d="M -80 820 Q 440 680 920 640 T 1700 300" stroke="url(#flowStroke)" stroke-width="1.5"/>
    <path d="M -80 700 Q 360 520 840 520 T 1700 140" stroke="url(#flowStroke)" stroke-width="2"/>
    <path d="M -80 640 Q 320 440 800 460 T 1700 60" stroke="url(#flowStroke)" stroke-width="1.5"/>
    <path d="M -80 880 Q 480 760 960 700 T 1700 380" stroke="url(#flowStroke)" stroke-width="1"/>
    <path d="M -80 580 Q 280 360 760 400 T 1700 -20" stroke="url(#flowStroke)" stroke-width="1"/>
  </g>

  <!-- Particles along the flow -->
  <g filter="url(#flowGlow)">
    <circle cx="880" cy="580" r="4" fill="#a5b4fc"/>
    <circle cx="920" cy="640" r="3" fill="#818cf8"/>
    <circle cx="840" cy="520" r="4" fill="#c7d2fe"/>
    <circle cx="800" cy="460" r="3" fill="#a5b4fc"/>
    <circle cx="1300" cy="320" r="5" fill="#e0e7ff"/>
    <circle cx="1200" cy="400" r="3" fill="#818cf8"/>
    <circle cx="500" cy="600" r="3" fill="#a5b4fc"/>
    <circle cx="400" cy="540" r="2" fill="#818cf8"/>
  </g>

  <!-- Direction arrow accent (top-right) -->
  <g transform="translate(1380, 200)" stroke="#a5b4fc" stroke-width="1.5" stroke-opacity="0.4" fill="none">
    <line x1="0" y1="0" x2="60" y2="-30"/>
    <polyline points="48,-36 60,-30 54,-18"/>
  </g>

  <!-- Subtle baseline -->
  <line x1="0" y1="850" x2="1600" y2="850" stroke="#ffffff" stroke-opacity="0.03"/>
</svg>
