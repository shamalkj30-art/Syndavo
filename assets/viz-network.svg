<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="netBg" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#0a0a18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="netNode" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="40%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0"/>
    </radialGradient>
    <filter id="netGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="netDots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#08081a"/>
  <rect width="1600" height="900" fill="url(#netDots)"/>
  <rect width="1600" height="900" fill="url(#netBg)"/>

  <!-- Connection lines -->
  <g stroke="#6366f1" stroke-width="1" stroke-opacity="0.35" fill="none">
    <line x1="240" y1="200" x2="560" y2="380"/>
    <line x1="560" y1="380" x2="900" y2="220"/>
    <line x1="560" y1="380" x2="820" y2="560"/>
    <line x1="560" y1="380" x2="320" y2="640"/>
    <line x1="240" y1="200" x2="900" y2="220"/>
    <line x1="900" y1="220" x2="1280" y2="340"/>
    <line x1="820" y1="560" x2="1280" y2="340"/>
    <line x1="820" y1="560" x2="1180" y2="700"/>
    <line x1="320" y1="640" x2="820" y2="560"/>
    <line x1="1280" y1="340" x2="1180" y2="700"/>
  </g>

  <!-- Glow halos -->
  <g filter="url(#netGlow)">
    <circle cx="560" cy="380" r="44" fill="url(#netNode)" opacity="0.7"/>
    <circle cx="900" cy="220" r="32" fill="url(#netNode)" opacity="0.55"/>
    <circle cx="1280" cy="340" r="32" fill="url(#netNode)" opacity="0.5"/>
  </g>

  <!-- Nodes -->
  <g>
    <circle cx="240" cy="200" r="5" fill="#a5b4fc"/>
    <circle cx="560" cy="380" r="9" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
    <circle cx="900" cy="220" r="7" fill="#c7d2fe"/>
    <circle cx="820" cy="560" r="6" fill="#a5b4fc"/>
    <circle cx="320" cy="640" r="5" fill="#818cf8"/>
    <circle cx="1280" cy="340" r="7" fill="#c7d2fe"/>
    <circle cx="1180" cy="700" r="5" fill="#818cf8"/>
  </g>

  <!-- Subtle grid lines (faded edge) -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
  </g>
</svg>
