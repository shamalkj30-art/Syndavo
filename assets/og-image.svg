<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="25%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#020202" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="#020202" width="1200" height="630"/>
  <rect fill="url(#bgGlow)" width="1200" height="630"/>

  <!-- Top accent line (chip effect) -->
  <rect x="450" y="0" width="300" height="2" fill="url(#topLine)"/>

  <!-- Subtle vertical lines at edges -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="1120" y1="0" x2="1120" y2="630" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Eyebrow label -->
  <text x="120" y="118" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#a5b4fc" fill-opacity="0.85" letter-spacing="4" font-weight="500">STRATEGY · TECHNOLOGY · ADVISORY</text>

  <!-- Wordmark (large) -->
  <text x="120" y="310" font-family="'Newsreader', 'Iowan Old Style', 'Times New Roman', serif" font-size="148" fill="#ffffff" font-weight="300" letter-spacing="-2">Syndavo</text>

  <!-- Italic tagline -->
  <text x="120" y="400" font-family="'Newsreader', 'Iowan Old Style', 'Times New Roman', serif" font-size="48" fill="#ffffff" fill-opacity="0.55" font-style="italic" font-weight="300">Where vision becomes venture.</text>

  <!-- Decorative globe-mark in upper right -->
  <g transform="translate(1010, 200)">
    <circle r="92" fill="none" stroke="#818cf8" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle r="68" fill="#3730a3" fill-opacity="0.18"/>
    <circle r="44" fill="#3730a3" fill-opacity="0.32"/>
    <circle r="20" fill="#6366f1" fill-opacity="0.65"/>
    <circle r="6" fill="#e0e7ff"/>
  </g>

  <!-- Bottom row: domain + tag -->
  <line x1="120" y1="500" x2="1080" y2="500" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="120" y="544" font-family="'Inter', system-ui, sans-serif" font-size="16" fill="#ffffff" fill-opacity="0.7" font-weight="500">syndavo.com</text>
  <text x="1080" y="544" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" fill="#10b981" fill-opacity="0.85" letter-spacing="3" font-weight="500">ACCEPTING NEW FOUNDERS</text>
</svg>
