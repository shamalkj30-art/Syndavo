<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ringBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#0a0a18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ringCore" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0"/>
    </radialGradient>
    <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="ringDots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="#08081a"/>
  <rect width="1600" height="900" fill="url(#ringDots)"/>
  <rect width="1600" height="900" fill="url(#ringBg)"/>

  <!-- Concentric rings — center at (800, 450) -->
  <g fill="none" stroke="#818cf8">
    <circle cx="800" cy="450" r="80" stroke-opacity="0.55" stroke-width="1.5"/>
    <circle cx="800" cy="450" r="140" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="800" cy="450" r="210" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="800" cy="450" r="290" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="4 6"/>
    <circle cx="800" cy="450" r="380" stroke-opacity="0.16" stroke-width="1"/>
    <circle cx="800" cy="450" r="480" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="2 8"/>
    <circle cx="800" cy="450" r="590" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="800" cy="450" r="710" stroke-opacity="0.05" stroke-width="1"/>
  </g>

  <!-- Crosshair guides -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
  </g>

  <!-- Glow halo at center -->
  <circle cx="800" cy="450" r="120" fill="url(#ringCore)" opacity="0.6" filter="url(#ringGlow)"/>

  <!-- Center node -->
  <circle cx="800" cy="450" r="6" fill="#e0e7ff"/>
  <circle cx="800" cy="450" r="14" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>

  <!-- Orbital markers — small accent points on rings -->
  <g fill="#a5b4fc">
    <circle cx="880" cy="450" r="3"/>
    <circle cx="660" cy="450" r="3"/>
    <circle cx="800" cy="240" r="3"/>
    <circle cx="985" cy="595" r="2.5"/>
    <circle cx="557" cy="544" r="2.5"/>
    <circle cx="990" cy="310" r="2"/>
  </g>

  <!-- Tick marks on horizontal axis -->
  <g stroke="#a5b4fc" stroke-opacity="0.35" stroke-width="1">
    <line x1="370" y1="448" x2="370" y2="452"/>
    <line x1="540" y1="448" x2="540" y2="452"/>
    <line x1="1060" y1="448" x2="1060" y2="452"/>
    <line x1="1230" y1="448" x2="1230" y2="452"/>
  </g>
</svg>
